<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Moment In Time</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
}

/* Kitty */
#catWrap{
  position:fixed;
  width:110px;
  height:110px;
  cursor:pointer;
}

#catImg{
  width:110px;
}

/* Bubble */
.cat-bubble{
  position:absolute;
  bottom:120%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:6px 12px;
  border-radius:6px;
  font-size:12px;
  opacity:0;
  transition:0.3s;
}

.cat-bubble.show{
  opacity:1;
}

/* floating emoji */
.hfly{
  position:fixed;
  animation:float 1.5s ease-out forwards;
}

@keyframes float{
  to{transform:translateY(-200px);opacity:0;}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎵</button>

<!-- KITTY -->
<div id="catWrap">
  <div class="cat-bubble" id="bubble">😺</div>
  <img id="catImg" src="hello-kitty.png">
</div>

<script>
/* MUSIC */
const music=document.getElementById("bgMusic");
let isPlaying=false;

function toggleMusic(){
  if(isPlaying){
    music.pause();
  }else{
    music.volume=0;
    music.play();

    let v=0;
    let fade=setInterval(()=>{
      if(v>=0.6) clearInterval(fade);
      else{
        v+=0.02;
        music.volume=v;
      }
    },100);
  }
  isPlaying=!isPlaying;
}

/* KITTY */
const cat=document.getElementById("catWrap");
const bubble=document.getElementById("bubble");

let x=200,y=200;

function moveCat(nx,ny){
  cat.style.transform=`translate(${nx}px,${ny}px)`;
  x=nx;y=ny;
}

/* FUNNY MESSAGES */
const msgs=[
"😾 Don't touch!",
"😹 Missed me!",
"😻 I'm cute!",
"🙀 Running!",
"😼 Boss here!",
"🎂 Cake time!",
"🥳 Partyyyy!",
"💖 Love you!"
];

/* RUN AWAY */
function flee(mx,my){
  let dx=x-mx;
  let dy=y-my;
  let len=Math.hypot(dx,dy)||1;

  dx/=len; dy/=len;

  let nx=x+dx*150;
  let ny=y+dy*100;

  nx=Math.max(0,Math.min(window.innerWidth-120,nx));
  ny=Math.max(0,Math.min(window.innerHeight-120,ny));

  moveCat(nx,ny);

  showMsg();
  hearts(nx,ny);
}

/* MESSAGE */
function showMsg(){
  bubble.innerText=msgs[Math.floor(Math.random()*msgs.length)];
  bubble.classList.add("show");
  setTimeout(()=>bubble.classList.remove("show"),2000);
}

/* HEART BURST */
function hearts(x,y){
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      let h=document.createElement("div");
      h.innerText="💖";
      h.className="hfly";
      h.style.left=x+"px";
      h.style.top=y+"px";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),1500);
    },i*80);
  }
}

/* MOUSE DETECT */
window.addEventListener("mousemove",e=>{
  let dist=Math.hypot(e.clientX-x,e.clientY-y);
  if(dist<120){
    flee(e.clientX,e.clientY);
  }
});

/* CLICK */
cat.onclick=()=>{
  flee(x+50,y+50);
};

/* INIT */
moveCat(200,200);

</script>
</body>
</html>
